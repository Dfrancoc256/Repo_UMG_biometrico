<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Nuevo Curso', ${activeMenu})}">
<body>

<th:block th:fragment="content">

    <div class="page-header">
        <div>
            <h2>
                <i class="fas fa-book" style="margin-right:10px;color:var(--umg-azul);"></i>
                <span th:text="${curso.id != null} ? 'Editar Curso' : 'Nuevo Curso'">Nuevo Curso</span>
            </h2>

            <p class="breadcrumb">
                <a th:href="@{/cursos}">Cursos</a> &rsaquo; Formulario
            </p>
        </div>
    </div>

    <div class="card" style="max-width:700px;">

        <div class="card-header">
            <h5>
                <i class="fas fa-edit" style="margin-right:8px;"></i>
                Información del Curso
            </h5>
        </div>

        <div class="card-body">

            <form th:action="@{/cursos/guardar}" method="post">

                <input type="hidden" name="id" th:value="${curso.id}"/>

                <div style="display:grid;grid-template-columns:1fr 2fr;gap:14px;">

                    <div class="form-group">
                        <label class="form-label">
                            Código
                            <small style="color:#7a8898;font-weight:400;" th:if="${curso.id == null}">
                                (auto-generado)
                            </small>
                        </label>

                        <div th:if="${curso.id == null}" style="position:relative;">
                            <input type="text"
                                   class="form-control"
                                   name="codigo"
                                   id="campoCodigo"
                                   th:placeholder="${codigoPreview}"
                                   style="padding-right:110px;font-family:monospace;color:#1a3a6b;font-weight:600;"/>

                            <span id="badgeCodigo"
                                  style="position:absolute;right:8px;top:50%;transform:translateY(-50%);
                           background:#eef2ff;color:#3730a3;font-size:11px;font-weight:700;
                           padding:2px 8px;border-radius:10px;pointer-events:none;"
                                  th:text="${codigoPreview}">
                CUR-2026-001
              </span>
                        </div>

                        <input th:if="${curso.id != null}"
                               type="text"
                               class="form-control"
                               name="codigo"
                               th:value="${curso.codigo}"
                               readonly
                               style="font-family:monospace;color:#1a3a6b;font-weight:600;background:#f5f7fa;"/>

                        <small th:if="${curso.id == null}" style="color:#7a8898;font-size:11px;margin-top:4px;display:block;">
                            <i class="fas fa-info-circle"></i>
                            Deja en blanco para usar el código sugerido.
                        </small>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nombre del Curso *</label>

                        <input type="text"
                               class="form-control"
                               name="nombre"
                               th:value="${curso.nombre}"
                               placeholder="Ej: Programación III"
                               required/>
                    </div>

                </div>

                <div class="form-group">
                    <label class="form-label">Carrera *</label>

                    <select class="form-control" name="carrera.id" required>
                        <option value="">-- Seleccione una carrera --</option>

                        <option th:each="c : ${carreras}"
                                th:value="${c.id}"
                                th:text="${c.nombre}"
                                th:selected="${curso.carrera != null and curso.carrera.id == c.id}">
                            Carrera
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        Catedrático *
                        <small style="color:#7a8898;font-weight:400;">
                            (máximo 5 cursos por catedrático)
                        </small>
                    </label>

                    <select class="form-control" name="catedraticoId" required>
                        <option value="">-- Seleccione un catedrático --</option>

                        <option th:each="cat : ${catedraticos}"
                                th:value="${cat.id}"
                                th:text="${cat.nombreCompleto} + ' (' + ${cursosPerCatedratico[cat.id] ?: 0} + '/5)'"
                                th:disabled="${cursosPerCatedratico[cat.id] != null
                                  and cursosPerCatedratico[cat.id] >= 5
                                  and (curso.id == null
                                       or curso.catedratico == null
                                       or curso.catedratico.id != cat.id)}"
                                th:selected="${curso.catedratico != null and curso.catedratico.id == cat.id}"
                                th:style="${cursosPerCatedratico[cat.id] != null
                               and cursosPerCatedratico[cat.id] >= 5
                               and (curso.id == null
                                    or curso.catedratico == null
                                    or curso.catedratico.id != cat.id)}
                              ? 'color:#aaa;' : ''">
                            Catedrático
                        </option>
                    </select>
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">

                    <div class="form-group">
                        <label class="form-label">Salón</label>

                        <input type="text"
                               class="form-control"
                               name="salon"
                               th:value="${curso.salon}"
                               placeholder="Ej: Salón 201"/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Horario</label>

                        <input type="text"
                               class="form-control"
                               name="horario"
                               th:value="${curso.horario}"
                               placeholder="Ej: Lunes y Miércoles 18:00-21:00"/>
                    </div>

                </div>

                <div style="display:flex;gap:12px;margin-top:8px;">

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i>
                        <span th:text="${curso.id != null} ? 'Actualizar' : 'Guardar Curso'">
              Guardar
            </span>
                    </button>

                    <a th:href="@{/cursos}" class="btn btn-outline">
                        <i class="fas fa-arrow-left"></i>
                        Cancelar
                    </a>

                </div>

            </form>

        </div>
    </div>

    <script th:if="${curso.id == null}">
        const campoCodigo = document.getElementById('campoCodigo');
        const badgeCodigo = document.getElementById('badgeCodigo');

        campoCodigo.addEventListener('input', () => {
            badgeCodigo.style.display = campoCodigo.value.trim() ? 'none' : '';
        });

        fetch('/cursos/preview-codigo')
            .then(r => r.text())
            .then(codigo => {
                campoCodigo.placeholder = codigo;
                badgeCodigo.textContent = codigo;
            })
            .catch(() => {});
    </script>

</th:block>

</body>
</html>
