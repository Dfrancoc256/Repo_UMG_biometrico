<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/main :: layout(~{::content}, 'Cursos', ${activeMenu})}">
<body>

<th:block th:fragment="content">

    <div class="page-header">
        <div>
            <h2>
                <i class="fas fa-book" style="margin-right:10px;color:var(--umg-azul);"></i>
                Cursos
            </h2>
            <p class="breadcrumb">Árbol de carreras y cursos activos</p>
        </div>

        <a th:href="@{/cursos/nuevo}" class="btn btn-primary"
           sec:authorize="hasRole('ADMIN')">
            <i class="fas fa-plus"></i> Nuevo Curso
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <h5>
                <i class="fas fa-graduation-cap" style="margin-right:8px;"></i>
                Carreras con sus cursos
            </h5>
        </div>

        <div class="card-body">

            <div class="tree-container">

                <div class="tree-root" th:each="carrera : ${carreras}">

                    <div class="career-node" onclick="toggleCursos(this)">
                        <i class="fas fa-university"></i>
                        <span th:text="${carrera.nombre}">Carrera</span>
                        <i class="fas fa-chevron-down arrow-icon"></i>
                    </div>

                    <div class="course-children">

                        <div class="course-node" th:each="curso : ${carrera.cursos}">

                            <div class="course-info">
                                <i class="fas fa-book"></i>

                                <div>
                                    <strong th:text="${curso.nombre}">Nombre del Curso</strong>
                                    <small>
                                        <code th:text="${curso.codigo != null ? curso.codigo : 'Sin código'}">Código</code>
                                        <span> | </span>
                                        <span th:text="${curso.catedratico != null ? curso.catedratico.nombreCompleto : 'Sin catedrático'}">
                      Catedrático
                    </span>
                                    </small>
                                </div>
                            </div>

                            <div class="course-actions">

                                <a th:href="@{/cursos/{id}(id=${curso.id})}"
                                   class="btn btn-outline btn-xs"
                                   title="Ver estudiantes">
                                    <i class="fas fa-users"></i> Estudiantes
                                </a>

                                <a th:href="@{/asistencia/curso/{id}(id=${curso.id})}"
                                   class="btn btn-success btn-xs"
                                   title="Asistencia">
                                    <i class="fas fa-clipboard-check"></i> Asistencia
                                </a>

                                <a th:href="@{/cursos/{id}/editar(id=${curso.id})}"
                                   class="btn btn-warning btn-xs"
                                   title="Editar curso"
                                   sec:authorize="hasRole('ADMIN')">
                                    <i class="fas fa-edit"></i>
                                </a>

                            </div>

                        </div>

                        <div class="course-empty"
                             th:if="${carrera.cursos == null or #lists.isEmpty(carrera.cursos)}">
                            <i class="fas fa-info-circle"></i>
                            Sin cursos asignados
                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <style>
        .tree-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 10px;
        }

        .tree-root {
            border-left: 3px solid var(--umg-azul);
            padding-left: 18px;
        }

        .career-node {
            background: #0b3c75;
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }

        .arrow-icon {
            margin-left: 8px;
            transition: transform 0.3s ease;
        }

        .tree-root.collapsed .course-children {
            display: none;
        }

        .tree-root.collapsed .arrow-icon {
            transform: rotate(-90deg);
        }

        .course-children {
            margin-left: 30px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 2px dashed #cbd5e1;
            padding-left: 18px;
        }

        .course-node {
            background: #f8fafc;
            border: 1px solid #dbe3ec;
            padding: 10px 14px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            width: 880px;
            max-width: 100%;
            color: #1f2937;
            font-weight: 500;
        }

        .course-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .course-info i {
            color: var(--umg-azul);
            font-size: 18px;
        }

        .course-info div {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .course-info small {
            color: #64748b;
            font-size: 12px;
            font-weight: 500;
        }

        .course-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-xs {
            padding: 5px 9px;
            font-size: 12px;
            border-radius: 7px;
        }

        .btn-success {
            background: #198754;
            color: white;
            border: 1px solid #198754;
        }

        .btn-warning {
            background: #d99a15;
            color: white;
            border: 1px solid #d99a15;
        }

        .course-empty {
            color: #6b7280;
            font-style: italic;
            padding: 8px 0;
        }
    </style>

    <script>
        function toggleCursos(elemento) {
            const raiz = elemento.closest('.tree-root');
            raiz.classList.toggle('collapsed');
        }
    </script>

</th:block>

</body>
</html>
