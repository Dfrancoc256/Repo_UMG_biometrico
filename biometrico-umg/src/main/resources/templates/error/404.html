<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Página no encontrada | Biométrico UMG</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:linear-gradient(135deg,#f0f4fa 0%,#e8eef6 100%);padding:20px;">
  <div style="text-align:center;max-width:480px;">

    <img th:src="@{/img/logo-umg1.png}" alt="UMG"
         style="width:70px;margin-bottom:24px;opacity:.85;"/>

    <div style="font-size:96px;font-weight:900;color:#003366;line-height:1;margin-bottom:8px;">
      404
    </div>
    <div style="font-size:22px;font-weight:600;color:#3a4a5c;margin-bottom:10px;">
      Página no encontrada
    </div>
    <p style="color:#7a8898;margin-bottom:32px;line-height:1.6;">
      La página que buscas no existe o fue movida.<br/>
      Verifica la URL o regresa al sistema.
    </p>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a th:href="@{/dashboard}" class="btn btn-primary">
        <i class="fas fa-tachometer-alt"></i> Ir al Dashboard
      </a>
      <a onclick="history.back()" class="btn btn-outline" style="cursor:pointer;">
        <i class="fas fa-arrow-left"></i> Volver atrás
      </a>
    </div>

    <p style="margin-top:36px;font-size:11px;color:#aab;">
      Sistema Biométrico UMG v2.0 · La Florida, Zona 19
    </p>
  </div>
</div>
</body>
</html>
