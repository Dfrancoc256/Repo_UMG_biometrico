<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error del servidor | Biométrico UMG</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:linear-gradient(135deg,#fdf0f0 0%,#f9e8e8 100%);padding:20px;">
  <div style="text-align:center;max-width:480px;">

    <img th:src="@{/img/logo-umg1.png}" alt="UMG"
         style="width:70px;margin-bottom:24px;opacity:.85;"/>

    <div style="font-size:96px;font-weight:900;color:#990000;line-height:1;margin-bottom:8px;">
      500
    </div>
    <div style="font-size:22px;font-weight:600;color:#3a4a5c;margin-bottom:10px;">
      Error interno del servidor
    </div>
    <p style="color:#7a8898;margin-bottom:24px;line-height:1.6;">
      Ocurrió un problema inesperado. El equipo técnico ha sido notificado.<br/>
      Por favor intenta nuevamente o regresa más tarde.
    </p>

    <!-- Detalle técnico (solo si hay mensaje) -->
    <div th:if="${message}" style="background:#fdecea;border:1px solid #ffcdd2;border-radius:8px;
                padding:12px 16px;margin-bottom:24px;text-align:left;font-size:12px;color:#c62828;">
      <i class="fas fa-exclamation-triangle" style="margin-right:6px;"></i>
      <code th:text="${message}">Error message</code>
    </div>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a th:href="@{/dashboard}" class="btn btn-primary">
        <i class="fas fa-tachometer-alt"></i> Ir al Dashboard
      </a>
      <a onclick="history.back()" class="btn btn-outline" style="cursor:pointer;">
        <i class="fas fa-arrow-left"></i> Volver atrás
      </a>
    </div>

    <p style="margin-top:36px;font-size:11px;color:#aab;">
      Sistema Biométrico UMG v2.0 · La Florida, Zona 19
    </p>
  </div>
</div>
</body>
</html>
