<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error del servidor | Biométrico UMG</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="error-fullpage error-500-bg">

  <div class="error-container">

    <img th:src="@{/img/logo-umg.png}"
         alt="UMG"
         class="error-logo"/>

    <div class="error-code error-code-danger">
      500
    </div>

    <h2 class="error-title">
      Error interno del servidor
    </h2>

    <p class="error-description">
      Ocurrió un problema inesperado.
      El equipo técnico ha sido notificado.
      <br/>
      Por favor intenta nuevamente o regresa más tarde.
    </p>

    <!-- DETALLE TECNICO -->
    <div th:if="${message}"
         class="error-technical-box">

      <i class="fas fa-exclamation-triangle"></i>

      <code th:text="${message}">
        Error message
      </code>

    </div>

    <div class="error-actions">

      <a th:href="@{/dashboard}" class="btn btn-primary">
        <i class="fas fa-tachometer-alt"></i>
        Ir al Dashboard
      </a>

      <a onclick="history.back()"
         class="btn btn-outline"
         style="cursor:pointer;">

        <i class="fas fa-arrow-left"></i>
        Volver atrás

      </a>

    </div>

    <p class="error-footer">
      Sistema Biométrico UMG v2.0 · La Florida, Zona 19
    </p>

  </div>

</div>
</body>
</html>
