<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Enrolar Persona', ${activeMenu})}">
<body>
<th:block th:fragment="content">

  <div class="page-header">
    <div>
      <h2><i class="fas fa-user-plus" style="margin-right:10px;color:var(--umg-azul);"></i>
        <span th:text="${persona.id != null} ? 'Editar Persona' : 'Enrolar Nueva Persona'">Enrolar</span>
      </h2>
      <p class="breadcrumb">
        <a th:href="@{/personas}">Personas</a> &rsaquo;
        <span th:text="${persona.id != null} ? 'Editar' : 'Nuevo Registro'">Nuevo</span>
      </p>
    </div>
  </div>

  <form th:action="@{/personas/guardar}" method="post" enctype="multipart/form-data">
    <input type="hidden" name="id" th:value="${persona.id}"/>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">

      <!-- Columna datos biográficos -->
      <div>
        <div class="card">
          <div class="card-header">
            <h5><i class="fas fa-id-card" style="margin-right:8px;"></i>Datos Biográficos</h5>
          </div>
          <div class="card-body">

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">

              <div class="form-group">
                <label class="form-label">Nombre *</label>
                <input type="text" class="form-control" name="nombre" th:value="${persona.nombre}"
                       placeholder="Ej: Juan Carlos" required/>
              </div>

              <div class="form-group">
                <label class="form-label">Apellido *</label>
                <input type="text" class="form-control" name="apellido" th:value="${persona.apellido}"
                       placeholder="Ej: Pérez López" required/>
              </div>

            </div>

            <div class="form-group">
              <label class="form-label">Correo Electrónico UMG *</label>
              <input type="email" class="form-control" name="correo" th:value="${persona.correo}"
                     placeholder="usuario@umg.edu.gt" required/>
            </div>

            <div class="form-group">
              <label class="form-label">Teléfono</label>
              <input type="tel" class="form-control" name="telefono" th:value="${persona.telefono}"
                     placeholder="+502 1234-5678"/>
            </div>

            <div class="form-group">
              <label class="form-label">Tipo de Persona *</label>
              <select class="form-control" name="tipoPersona" required>
                <option value="">-- Seleccione --</option>
                <option value="estudiante" th:selected="${persona.tipoPersona == 'estudiante'}">Estudiante</option>
                <option value="catedratico" th:selected="${persona.tipoPersona == 'catedratico'}">Catedrático</option>
                <option value="mantenimiento" th:selected="${persona.tipoPersona == 'mantenimiento'}">Mantenimiento</option>
                <option value="admin" th:selected="${persona.tipoPersona == 'admin'}">Administrador</option>
                <option value="otro" th:selected="${persona.tipoPersona == 'otro'}">Otro</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Carrera</label>
              <select class="form-control" name="carrera">
                <option value="">-- Seleccione --</option>
                <option value="Ingeniería en Sistemas"
                        th:selected="${persona.carrera == 'Ingeniería en Sistemas'}">Ingeniería en Sistemas</option>
                <option value="Psicología"
                        th:selected="${persona.carrera == 'Psicología'}">Psicología</option>
                <option value="Derecho"
                        th:selected="${persona.carrera == 'Derecho'}">Derecho</option>
                <option value="Arquitectura"
                        th:selected="${persona.carrera == 'Arquitectura'}">Arquitectura</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Sección</label>
              <select class="form-control" name="seccion">
                <option value="">-- Seleccione --</option>
                <option value="A" th:selected="${persona.seccion == 'A'}">Sección A</option>
                <option value="B" th:selected="${persona.seccion == 'B'}">Sección B</option>
                <option value="C" th:selected="${persona.seccion == 'C'}">Sección C</option>
                <option value="D" th:selected="${persona.seccion == 'D'}">Sección D</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Contraseña (para acceso al sistema)</label>
              <div style="position:relative;">
                <input type="password" class="form-control" name="contrasena"
                       id="campoContrasena"
                       placeholder="Dejar en blanco para no cambiar"
                       style="padding-right:42px;"/>
                <button type="button" onclick="toggleContrasena()"
                        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                               background:none;border:none;color:#7a8898;cursor:pointer;padding:4px;">
                  <i class="fas fa-eye" id="iconoContrasena"></i>
                </button>
              </div>
              <small style="color:#7a8898;font-size:11px;">
                <i class="fas fa-info-circle"></i>
                Solo requerido para catedráticos y administradores. Se cifrará automáticamente.
              </small>
            </div>

          </div>
        </div>
      </div>

      <!-- Columna foto y biométrico -->
      <div>
        <div class="card">
          <div class="card-header">
            <h5><i class="fas fa-camera" style="margin-right:8px;"></i>Fotografía Biométrica</h5>
          </div>
          <div class="card-body" style="text-align:center;">

            <!-- Preview de foto actual -->
            <div style="margin-bottom:16px;">
              <img th:if="${persona.fotoRuta != null}"
                   th:src="@{'/' + ${persona.fotoRuta}}"
                   id="previewFoto"
                   class="avatar-lg"
                   style="width:110px;height:110px;margin-bottom:10px;"
                   alt="Foto actual"/>
              <img th:unless="${persona.fotoRuta != null}"
                   id="previewFoto"
                   class="avatar-lg"
                   style="width:110px;height:110px;margin-bottom:10px;display:none;"
                   alt="Vista previa"/>
            </div>

            <!-- Webcam -->
            <div class="webcam-box" style="margin:0 auto 14px;display:inline-block;border-radius:10px;overflow:hidden;">
              <video id="webcamVideo" width="280" height="210" autoplay muted
                     style="display:block;background:#111;"></video>
              <div class="webcam-overlay">📹 Cámara en vivo</div>
            </div>
            <canvas id="webcamCanvas" style="display:none;"></canvas>
            <input type="hidden" id="fotoBase64" name="fotoBase64"/>

            <div style="display:flex;flex-direction:column;gap:10px;align-items:center;">
              <button type="button" class="btn btn-success" id="btnCapturar">
                <i class="fas fa-camera"></i> Capturar Foto
              </button>
              <div style="color:#7a8898;font-size:12px;">— o —</div>
              <label style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;">
                <span class="btn btn-outline btn-sm"><i class="fas fa-upload"></i> Subir desde archivo</span>
                <input type="file" name="foto" accept="image/jpeg,image/png,image/webp,image/gif"
                       style="display:none;" onchange="previewFotoArchivo(this)"/>
                <small id="nombreArchivoFoto" style="color:#7a8898;font-size:11px;max-width:180px;
                       overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></small>
              </label>
            </div>

          </div>
        </div>

        <div class="card" style="margin-top:20px;">
          <div class="card-header">
            <h5><i class="fas fa-fingerprint" style="margin-right:8px;"></i>Número de Carnet</h5>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">No. Carnet (se genera automáticamente si está vacío)</label>
              <input type="text" class="form-control" name="numeroCarnet" th:value="${persona.numeroCarnet}"
                     placeholder="UMG-XXXXXXX"/>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div style="display:flex;gap:14px;margin-top:10px;">
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i>
        <span th:text="${persona.id != null} ? 'Actualizar Persona' : 'Registrar Persona'">Guardar</span>
      </button>
      <a th:href="@{/personas}" class="btn btn-outline">
        <i class="fas fa-arrow-left"></i> Cancelar
      </a>
    </div>

  </form>

  <script>
    // Toggle ver/ocultar contraseña
    function toggleContrasena() {
      const campo = document.getElementById('campoContrasena');
      const icono = document.getElementById('iconoContrasena');
      if (campo.type === 'password') {
        campo.type = 'text';
        icono.className = 'fas fa-eye-slash';
      } else {
        campo.type = 'password';
        icono.className = 'fas fa-eye';
      }
    }

    const video   = document.getElementById('webcamVideo');
    const canvas  = document.getElementById('webcamCanvas');
    const b64Input = document.getElementById('fotoBase64');
    const preview = document.getElementById('previewFoto');
    let streamActivo = null;

    // Inicializar webcam al cargar la página
    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      .then(stream => {
        streamActivo = stream;
        video.srcObject = stream;
      })
      .catch(() => {
        video.style.display = 'none';
        document.getElementById('btnCapturar').style.display = 'none';
      });

    // Capturar foto desde webcam
    document.getElementById('btnCapturar').addEventListener('click', () => {
      if (!streamActivo) return;
      canvas.width  = video.videoWidth  || 320;
      canvas.height = video.videoHeight || 240;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
      b64Input.value = dataUrl;
      preview.src    = dataUrl;
      preview.style.display = 'block';
    });

    // Preview al subir archivo — también limpia el base64 para que no interfiera
    function previewFotoArchivo(input) {
      const file = input.files[0];
      if (!file) return;

      const tiposPermitidos = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp', 'image/gif'];
      if (!tiposPermitidos.includes(file.type)) {
        alert('Solo se permiten imágenes (JPG, PNG, WEBP, GIF).');
        input.value = '';
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        alert('La imagen no puede superar 5 MB.');
        input.value = '';
        return;
      }

      b64Input.value = '';          // archivo tiene prioridad sobre base64
      const nombreElem = document.getElementById('nombreArchivoFoto');
      if (nombreElem) nombreElem.textContent = file.name;

      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  </script>

</th:block>
</body>
</html>
