<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Enrolar Persona', ${activeMenu})}">
<body>
<th:block th:fragment="content">

    <div class="page-header">
        <div>
            <h2>
                <i class="fas fa-user-plus" style="margin-right:10px;color:var(--umg-azul);"></i>
                <span th:text="${persona.id != null} ? 'Editar Persona' : 'Enrolar Nueva Persona'">Enrolar</span>
            </h2>
            <p class="breadcrumb">
                <a th:href="@{/personas}">Personas</a> &rsaquo;
                <span th:text="${persona.id != null} ? 'Editar' : 'Nuevo Registro'">Nuevo</span>
            </p>
        </div>
    </div>

    <form th:action="@{/personas/guardar}" method="post" enctype="multipart/form-data">
        <input type="hidden" name="id" th:value="${persona.id}"/>

        <div class="enrolar-persona-grid">

            <div>
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-id-card" style="margin-right:8px;"></i>Datos Biográficos</h5>
                    </div>

                    <div class="card-body">

                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                            <div class="form-group">
                                <label class="form-label">Nombres </label>
                                <input type="text" class="form-control" name="nombre"
                                       th:value="${persona.nombre}" placeholder="Ej: Juan Carlos" required/>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Apellidos</label>
                                <input type="text" class="form-control" name="apellido"
                                       th:value="${persona.apellido}" placeholder="Ej: Pérez López" required/>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Correo Electrónico UMG *</label>
                            <input type="email" class="form-control" name="correo"
                                   th:value="${persona.correo}" placeholder="usuario@umg.edu.gt" required/>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" name="telefono"
                                   th:value="${persona.telefono}" placeholder="1234-5678"/>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Tipo de Persona *</label>

                            <select class="form-control" id="tipoPersonaSelect" name="tipoPersona"
                                    required onchange="sincronizarRol(this.value); actualizarTipo(this.value);">
                                <option value="">-- Seleccione --</option>
                                <option value="ESTUDIANTE" th:selected="${persona.tipoPersona == 'ESTUDIANTE'}">Estudiante</option>
                                <option value="CATEDRATICO" th:selected="${persona.tipoPersona == 'CATEDRATICO'}">Catedrático</option>
                                <option value="ADMIN" th:selected="${persona.tipoPersona == 'ADMIN'}">Administrador</option>
                            </select>

                            <input type="hidden" name="rol.id" id="rolIdHidden"
                                   th:value="${persona.rol != null ? persona.rol.id : ''}">
                        </div>

                        <div class="form-group" id="grupoCarrera">
                            <label class="form-label">Carrera</label>

                            <select class="form-control" name="carrera.id" id="selectCarrera">
                                <option value="">-- Seleccione --</option>

                                <option th:each="c : ${carreras}"
                                        th:value="${c.id}"
                                        th:text="${c.nombre}"
                                        th:selected="${persona.carrera != null and persona.carrera.id == c.id}">
                                    Carrera
                                </option>
                            </select>
                        </div>

                        <div class="form-group" id="grupoSeccion">
                            <label class="form-label">Sección</label>
                            <select class="form-control" name="seccion">
                                <option value="">-- Seleccione --</option>
                                <option value="A" th:selected="${persona.seccion == 'A'}">Sección A</option>
                                <option value="B" th:selected="${persona.seccion == 'B'}">Sección B</option>
                                <option value="C" th:selected="${persona.seccion == 'C'}">Sección C</option>
                                <option value="D" th:selected="${persona.seccion == 'D'}">Sección D</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Contraseña (para acceso al sistema)</label>
                            <div style="position:relative;">
                                <input type="password" class="form-control" name="contrasena"
                                       id="campoContrasena"
                                       placeholder="Dejar en blanco para no cambiar"
                                       style="padding-right:42px;"/>
                                <button type="button" onclick="toggleContrasena()"
                                        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                                        background:none;border:none;color:#7a8898;cursor:pointer;padding:4px;">
                                    <i class="fas fa-eye" id="iconoContrasena"></i>
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-camera" style="margin-right:8px;"></i>Fotografía Biométrica</h5>
                    </div>

                    <div class="card-body" style="text-align:center;">

                        <!-- Vista previa de foto actual o capturada -->
                        <div style="margin-bottom:14px;">
                            <img th:if="${persona.fotoRuta != null}"
                                 th:src="@{'/' + ${persona.fotoRuta}}"
                                 id="previewFoto"
                                 class="avatar-lg"
                                 style="width:110px;height:110px;margin-bottom:10px;"
                                 alt="Foto actual"/>
                            <img th:unless="${persona.fotoRuta != null}"
                                 id="previewFoto"
                                 class="avatar-lg"
                                 style="width:110px;height:110px;margin-bottom:10px;display:none;"
                                 alt="Vista previa"/>
                        </div>

                        <!-- Selector de cámaras físicas del PC -->
                        <div id="contenedorSelectorCamara"
                             style="margin-bottom:12px;background:#f0f5ff;border:1px solid #c7d8f5;
                                    border-radius:10px;padding:10px 14px;text-align:left;">
                            <p style="font-size:11px;font-weight:700;color:#1a3a6b;margin:0 0 8px;
                                      text-transform:uppercase;letter-spacing:.5px;">
                                <i class="fas fa-video" style="margin-right:5px;"></i>Cámara del equipo
                            </p>
                            <select id="selectCamara" class="form-control"
                                    style="font-size:13px;"
                                    onchange="cambiarCamaraFisica(this.value)">
                                <option value="">Detectando cámaras...</option>
                            </select>
                        </div>

                        <!-- Stream de la webcam seleccionada -->
                        <div style="margin:0 auto 14px;display:inline-block;border-radius:10px;overflow:hidden;position:relative;">
                            <video id="webcamVideo" width="280" height="210" autoplay muted
                                   style="display:block;background:#111;border-radius:10px;"></video>
                            <div class="webcam-overlay" id="overlayCamara">📹 Cámara en vivo</div>
                        </div>

                        <canvas id="webcamCanvas" style="display:none;"></canvas>
                        <input type="hidden" id="fotoBase64" name="fotoBase64"/>

                        <div style="display:flex;flex-direction:column;gap:10px;align-items:center;">
                            <button type="button" class="btn btn-success" id="btnCapturar">
                                <i class="fas fa-camera"></i> Capturar Foto
                            </button>

                            <div style="color:#7a8898;font-size:12px;">— o —</div>

                            <label style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;">
                                <span class="btn btn-outline btn-sm">
                                    <i class="fas fa-upload"></i> Subir desde archivo
                                </span>
                                <input type="file" name="foto" accept="image/jpeg,image/png,image/webp,image/gif"
                                       style="display:none;" onchange="previewFotoArchivo(this)"/>
                                <small id="nombreArchivoFoto" style="color:#7a8898;font-size:11px;max-width:180px;
                                       overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></small>
                            </label>
                        </div>

                    </div>
                </div>

                <div class="card" style="margin-top:20px;">
                    <div class="card-header">
                        <h5><i class="fas fa-fingerprint" style="margin-right:8px;"></i>Número de Carnet</h5>
                    </div>

                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">No. Carnet</label>
                            <input type="text"
                                   class="form-control"
                                   th:value="${persona.numeroCarnet != null && !persona.numeroCarnet.isBlank() ? persona.numeroCarnet : 'Se generará automáticamente'}"
                                   readonly
                                   style="background:#eef3f8;cursor:not-allowed;"/>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-actions-responsive">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i>
                <span th:text="${persona.id != null} ? 'Actualizar Persona' : 'Registrar Persona'">Guardar</span>
            </button>

            <a th:href="@{/personas}" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Cancelar
            </a>
        </div>

    </form>

    <script>
        function sincronizarRol(tipo) {
            const rolHidden = document.getElementById('rolIdHidden');

            if (tipo === 'ADMIN') {
                rolHidden.value = '1';
            } else if (tipo === 'CATEDRATICO') {
                rolHidden.value = '2';
            } else if (tipo === 'ESTUDIANTE') {
                rolHidden.value = '3';
            } else {
                rolHidden.value = '';
            }
        }

        function actualizarTipo(tipo) {
            const grupoSeccion = document.getElementById('grupoSeccion');
            const grupoCarrera = document.getElementById('grupoCarrera');

            if (grupoSeccion) {
                const ocultarSeccion = (tipo === 'CATEDRATICO' || tipo === 'ADMIN');
                grupoSeccion.style.display = ocultarSeccion ? 'none' : '';

                if (ocultarSeccion) {
                    const selectSeccion = grupoSeccion.querySelector('select');
                    if (selectSeccion) selectSeccion.value = '';
                }
            }

            if (grupoCarrera) {
                const ocultarCarrera = (tipo === 'CATEDRATICO' || tipo === 'ADMIN');
                grupoCarrera.style.display = ocultarCarrera ? 'none' : '';

                if (ocultarCarrera) {
                    const selectCarrera = document.getElementById('selectCarrera');
                    if (selectCarrera) selectCarrera.value = '';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const sel = document.getElementById('tipoPersonaSelect');

            if (sel) {
                sincronizarRol(sel.value);
                actualizarTipo(sel.value);
            }
        });

        function toggleContrasena() {
            const campo = document.getElementById('campoContrasena');
            const icono = document.getElementById('iconoContrasena');

            if (campo.type === 'password') {
                campo.type = 'text';
                icono.className = 'fas fa-eye-slash';
            } else {
                campo.type = 'password';
                icono.className = 'fas fa-eye';
            }
        }

        const video    = document.getElementById('webcamVideo');
        const canvas   = document.getElementById('webcamCanvas');
        const b64Input = document.getElementById('fotoBase64');
        const preview  = document.getElementById('previewFoto');
        const selectCamara = document.getElementById('selectCamara');
        const overlay      = document.getElementById('overlayCamara');

        let streamActivo = null;

        // Enumerar cámaras físicas del PC y arrancar la primera
        async function cargarCamaras() {
            try {
                // Pedir permiso primero para que el navegador revele las etiquetas
                const permiso = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                permiso.getTracks().forEach(t => t.stop());

                const dispositivos = await navigator.mediaDevices.enumerateDevices();
                const camaras = dispositivos.filter(d => d.kind === 'videoinput');

                selectCamara.innerHTML = '';
                if (camaras.length === 0) {
                    selectCamara.innerHTML = '<option value="">No se detectaron cámaras</option>';
                    video.style.display = 'none';
                    return;
                }

                camaras.forEach((cam, i) => {
                    const opt = document.createElement('option');
                    opt.value = cam.deviceId;
                    opt.textContent = cam.label || ('Cámara ' + (i + 1));
                    selectCamara.appendChild(opt);
                });

                // Activar la primera cámara automáticamente
                await cambiarCamaraFisica(camaras[0].deviceId);

            } catch (err) {
                selectCamara.innerHTML = '<option value="">Permiso de cámara denegado</option>';
                video.style.display = 'none';
            }
        }

        async function cambiarCamaraFisica(deviceId) {
            if (!deviceId) return;
            if (streamActivo) {
                streamActivo.getTracks().forEach(t => t.stop());
                streamActivo = null;
            }
            try {
                const constraints = { video: { deviceId: { exact: deviceId } }, audio: false };
                streamActivo = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = streamActivo;
                video.style.display = 'block';
                const opcion = selectCamara.options[selectCamara.selectedIndex];
                if (overlay && opcion) overlay.textContent = '📹 ' + opcion.textContent;
            } catch (err) {
                video.style.display = 'none';
            }
        }

        cargarCamaras();

        document.getElementById('btnCapturar').addEventListener('click', () => {
            if (!streamActivo) {
                alert('No hay cámara activa disponible.');
                return;
            }
            canvas.width  = video.videoWidth  || 320;
            canvas.height = video.videoHeight || 240;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
            b64Input.value = dataUrl;
            preview.src    = dataUrl;
            preview.style.display = 'block';
        });

        function previewFotoArchivo(input) {
            const file = input.files[0];
            if (!file) return;

            const tiposPermitidos = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp', 'image/gif'];

            if (!tiposPermitidos.includes(file.type)) {
                alert('Solo se permiten imágenes (JPG, PNG, WEBP, GIF).');
                input.value = '';
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                alert('La imagen no puede superar 5 MB.');
                input.value = '';
                return;
            }

            b64Input.value = '';

            const nombreElem = document.getElementById('nombreArchivoFoto');
            if (nombreElem) nombreElem.textContent = file.name;

            const reader = new FileReader();

            reader.onload = e => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };

            reader.readAsDataURL(file);
        }
    </script>

</th:block>
</body>
</html>
