<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Instalaciones', ${activeMenu})}">
<body>
<th:block th:fragment="content">

  <div class="page-header">
    <div>
      <h2><i class="fas fa-building" style="margin-right:10px;color:var(--umg-azul);"></i>Instalaciones</h2>
      <p class="breadcrumb">Edificios y accesos registrados en el sistema</p>
    </div>
    <a th:href="@{/instalaciones/nueva}" class="btn btn-primary">
      <i class="fas fa-plus"></i> Nueva Instalación
    </a>
  </div>

  <div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr));">
    <div th:each="inst : ${instalaciones}" class="card"
         style="cursor:pointer;transition:transform .2s,box-shadow .2s;"
         onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,.15)'"
         onmouseout="this.style.transform='';this.style.boxShadow=''">
      <div class="card-body" style="padding:22px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
          <div style="background:#eef2f7;padding:10px;border-radius:10px;">
            <i class="fas fa-building" style="font-size:22px;color:var(--umg-azul);"></i>
          </div>
          <span class="badge badge-info">Instalación</span>
        </div>
        <h4 style="font-size:16px;font-weight:700;color:var(--umg-azul);margin-bottom:6px;"
            th:text="${inst.nombre}">Nombre</h4>
        <p style="font-size:13px;color:#7a8898;margin-bottom:16px;">
          <i class="fas fa-map-marker-alt" style="width:16px;"></i>
          <span th:text="${inst.direccion != null ? inst.direccion : 'Sin dirección registrada'}">Dirección</span>
        </p>
        <a th:href="@{/instalaciones/{id}(id=${inst.id})}" class="btn btn-primary"
           style="width:100%;justify-content:center;">
          <i class="fas fa-door-open"></i> Ver Accesos y Salones
        </a>
      </div>
    </div>
  </div>

  <div th:if="${instalaciones == null or #lists.isEmpty(instalaciones)}" class="card">
    <div class="card-body" style="text-align:center;padding:60px;color:#7a8898;">
      <i class="fas fa-building" style="font-size:40px;display:block;margin-bottom:14px;"></i>
      No hay instalaciones registradas.
      <br/><br/>
      <a th:href="@{/instalaciones/nueva}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Registrar primera instalación
      </a>
    </div>
  </div>

</th:block>
</body>
</html>
