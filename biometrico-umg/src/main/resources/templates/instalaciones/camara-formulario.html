<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Cámara', ${activeMenu})}">
<body>
<th:block th:fragment="content">

    <div class="page-header">
        <div>
            <h2>
                <i class="fas fa-video" style="margin-right:10px;color:var(--umg-azul);"></i>
                <span th:text="${camara.id != null} ? 'Editar Cámara' : 'Agregar Cámara'">Agregar Cámara</span>
            </h2>

            <p class="breadcrumb">
                <a th:href="@{/instalaciones}">Instalaciones</a> &rsaquo;
                <a th:href="@{/instalaciones/{id}(id=${instalacion.id})}" th:text="${instalacion.nombre}">Instalación</a>
                &rsaquo;
                <span th:text="${camara.id != null} ? 'Editar Cámara' : 'Nueva Cámara'">Nueva Cámara</span>
            </p>
        </div>
    </div>

    <div class="card" style="max-width:720px;">
        <div class="card-header">
            <h5><i class="fas fa-cog" style="margin-right:8px;"></i> Información de la Cámara</h5>
        </div>

        <div class="card-body">

            <form th:action="${camara.id != null}
                        ? '/instalaciones/' + ${instalacion.id} + '/camara/' + ${camara.id} + '/guardar'
                        : '/instalaciones/' + ${instalacion.id} + '/camara/guardar'"
                  method="post">

                <div class="form-group">
                    <label class="form-label" for="nombre">Nombre de la cámara *</label>
                    <input type="text" class="form-control" id="nombre" name="nombre"
                           th:value="${camara.nombre}" placeholder="Ej: Cámara Salón A-101" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="puertaId">Acceso / Salón *</label>
                    <select class="form-control" id="puertaId" name="puertaId" required>
                        <option value="">-- Seleccione acceso o salón --</option>
                        <option th:each="p : ${puertas}"
                                th:value="${p.id}"
                                th:selected="${camara.puerta != null and camara.puerta.id == p.id}"
                                th:text="${p.nombre + ' — ' + (p.esSalon ? 'Salón' : 'Acceso')}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="modo">Modo</label>
                    <select class="form-control" id="modo" name="modo">
                        <option value="ASISTENCIA" th:selected="${camara.modo == null or camara.modo == 'ASISTENCIA'}">ASISTENCIA</option>
                        <option value="ACCESO" th:selected="${camara.modo == 'ACCESO'}">ACCESO</option>
                        <option value="KIOSKO" th:selected="${camara.modo == 'KIOSKO'}">KIOSKO</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="ip">IP / Referencia</label>
                    <input type="text" class="form-control" id="ip" name="ip"
                           th:value="${camara.ip}" placeholder="Ej: LOCAL, Laptop salón, 192.168.1.50">
                </div>

                <div class="form-group">
                    <label class="form-label" for="token">Token / Identificador opcional</label>
                    <input type="text" class="form-control" id="token" name="token"
                           th:value="${camara.token}" placeholder="Opcional">
                </div>

                <div class="form-group">
                    <label class="form-label" for="activa">Estado</label>
                    <select class="form-control" id="activa" name="activa">
                        <option value="true" th:selected="${camara.activa == null or camara.activa}">Activa</option>
                        <option value="false" th:selected="${camara.activa != null and !camara.activa}">Inactiva</option>
                    </select>
                </div>

                <div th:if="${camara.id != null}" class="form-group">
                    <label class="form-label" for="urlKiosko">URL del Kiosko</label>
                    <input type="text" class="form-control" id="urlKiosko"
                           th:value="'/kiosko/?camaraId=' + ${camara.id}" readonly>
                </div>

                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i>
                        <span th:text="${camara.id != null} ? 'Actualizar Cámara' : 'Guardar Cámara'">Guardar Cámara</span>
                    </button>

                    <a th:href="@{/instalaciones/{id}(id=${instalacion.id})}" class="btn btn-outline">
                        <i class="fas fa-arrow-left"></i> Cancelar
                    </a>

                    <a th:if="${camara.id != null}"
                       th:href="@{/kiosko/(camaraId=${camara.id})}"
                       target="_blank"
                       class="btn btn-success">
                        <i class="fas fa-external-link-alt"></i> Abrir Kiosko
                    </a>
                </div>

            </form>

        </div>
    </div>

</th:block>
</body>
</html>
