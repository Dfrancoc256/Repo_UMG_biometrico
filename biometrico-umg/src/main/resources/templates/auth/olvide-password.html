<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/auth :: authLayout(~{::content}, 'recuperar')}">
<body>
<th:block th:fragment="content">

    <h2>Recuperar contraseña</h2>

    <p style="color:#666;margin-bottom:18px;">
        Ingresa tu correo registrado y te enviaremos un enlace para restablecer tu contraseña.
    </p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:action="@{/auth/olvide-password}" method="post">

        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email"
                   name="correo"
                   class="form-control"
                   placeholder="ejemplo@correo.com"
                   required>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:14px;">
            Enviar enlace
        </button>

        <div style="text-align:center;margin-top:18px;">
            <a th:href="@{/auth/login}">Volver al inicio de sesión</a>
        </div>

    </form>

</th:block>
</body>
</html>
