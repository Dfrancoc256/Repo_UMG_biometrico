<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Nuevo Curso', ${activeMenu})}">
<body>

<th:block th:fragment="content">

  <div class="page-header">
    <div>
      <h2>
        <i class="fas fa-book" style="margin-right:10px;color:var(--umg-azul);"></i>
        <span th:text="${curso.id != null} ? 'Editar Curso' : 'Nuevo Curso'">
          Nuevo Curso
        </span>
      </h2>

      <p class="breadcrumb">
        <a th:href="@{/cursos}">Cursos</a> &rsaquo; Formulario
      </p>
    </div>
  </div>

  <div class="card" style="max-width:700px;">

    <div class="card-header">
      <h5>
        <i class="fas fa-edit" style="margin-right:8px;"></i>
        Información del Curso
      </h5>
    </div>

    <div class="card-body">

      <form th:action="@{/cursos/guardar}" method="post">

        <input type="hidden" name="id" th:value="${curso.id}"/>

        <!-- CODIGO Y NOMBRE -->
        <div style="display:grid;grid-template-columns:1fr 2fr;gap:14px;">

          <div class="form-group">
            <label class="form-label">
              Código

              <small style="color:#7a8898;font-weight:400;"
                     th:if="${curso.id == null}">
                (auto-generado si se deja vacío)
              </small>
            </label>

            <input type="text"
                   class="form-control"
                   name="codigo"
                   th:value="${curso.codigo}"
                   placeholder="Ej: SIS-301 (opcional)"
                   th:readonly="${curso.id != null}"/>
          </div>

          <div class="form-group">
            <label class="form-label">Nombre del Curso *</label>

            <input type="text"
                   class="form-control"
                   name="nombre"
                   th:value="${curso.nombre}"
                   placeholder="Ej: Programación III"
                   required/>
          </div>

        </div>

        <!-- CARRERA -->
        <div class="form-group">
          <label class="form-label">Carrera *</label>

          <select class="form-control" name="carrera.id" required>

            <option value="">-- Seleccione una carrera --</option>

            <option th:each="c : ${carreras}"
                    th:value="${c.id}"
                    th:text="${c.nombre}"
                    th:selected="${curso.carrera != null and curso.carrera.id == c.id}">
              Carrera
            </option>

          </select>
        </div>

        <!-- CATEDRATICO -->
        <div class="form-group">

          <label class="form-label">Catedrático *</label>

          <select class="form-control" name="catedraticoId" required>

            <option value="">-- Seleccione un catedrático --</option>

            <option th:each="cat : ${catedraticos}"
                    th:value="${cat.id}"
                    th:text="${cat.nombreCompleto}"
                    th:selected="${curso.catedratico != null and curso.catedratico.id == cat.id}">
              Catedrático
            </option>

          </select>
        </div>

        <!-- SALON Y HORARIO -->
        <div class="form-group">
          <label class="form-label">Horario *</label>

          <select class="form-control" name="horario" required>
            <option value="">-- Seleccione un horario --</option>

            <option value="Lunes y Miércoles 07:00-09:00"
                    th:selected="${curso.horario == 'Lunes y Miércoles 07:00-09:00'}">
              Lunes y Miércoles 07:00-09:00
            </option>

            <option value="Lunes y Miércoles 09:00-11:00"
                    th:selected="${curso.horario == 'Lunes y Miércoles 09:00-11:00'}">
              Lunes y Miércoles 09:00-11:00
            </option>

            <option value="Martes y Jueves 07:00-09:00"
                    th:selected="${curso.horario == 'Martes y Jueves 07:00-09:00'}">
              Martes y Jueves 07:00-09:00
            </option>

            <option value="Martes y Jueves 09:00-11:00"
                    th:selected="${curso.horario == 'Martes y Jueves 09:00-11:00'}">
              Martes y Jueves 09:00-11:00
            </option>

            <option value="Sábado 08:00-12:00"
                    th:selected="${curso.horario == 'Sábado 08:00-12:00'}">
              Sábado 08:00-12:00
            </option>

            <option value="Domingo 08:00-12:00"
                    th:selected="${curso.horario == 'Domingo 08:00-12:00'}">
              Domingo 08:00-12:00
            </option>
          </select>
        </div>

        <!-- BOTONES -->
        <div style="display:flex;gap:12px;margin-top:8px;">

          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i>

            <span th:text="${curso.id != null} ? 'Actualizar' : 'Guardar Curso'">
              Guardar
            </span>
          </button>

          <a th:href="@{/cursos}" class="btn btn-outline">
            <i class="fas fa-arrow-left"></i>
            Cancelar
          </a>

        </div>

      </form>

    </div>
  </div>

</th:block>

</body>
</html>
