<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/main :: layout(~{::content}, 'Cursos', ${activeMenu})}">
<body>

<th:block th:fragment="content">

    <div class="page-header">
        <div>
            <h2>
                <i class="fas fa-book" style="margin-right:10px;color:var(--umg-azul);"></i>
                Cursos
            </h2>
            <p class="breadcrumb">Árbol de carreras y cursos activos</p>
        </div>

        <a th:href="@{/cursos/nuevo}"
           class="btn btn-primary"
           sec:authorize="hasRole('ADMIN')">
            <i class="fas fa-plus"></i> Nuevo Curso
        </a>
    </div>

    <div class="card">

        <div class="card-header">
            <h5>
                <i class="fas fa-graduation-cap" style="margin-right:8px;"></i>
                Carreras con sus cursos
            </h5>
        </div>

        <div class="card-body">

            <div class="tree-container">

                <!-- CARRERAS -->
                <div class="tree-root collapsed"
                     th:each="entry : ${cursosPorCarrera}">

                    <!-- RAIZ -->
                    <div class="career-node"
                         onclick="toggleCursos(this)">

                        <div style="display:flex;align-items:center;gap:10px;">
                            <i class="fas fa-university"></i>

                            <span th:text="${entry.key}">
                                Carrera
                            </span>
                        </div>

                        <i class="fas fa-chevron-down arrow-icon"></i>
                    </div>

                    <!-- CURSOS -->
                    <div class="course-children">

                        <div class="course-node"
                             th:each="curso : ${entry.value}">

                            <!-- INFO -->
                            <div class="course-info">

                                <i class="fas fa-book"></i>

                                <div>

                                    <strong th:text="${curso.nombre}">
                                        Nombre Curso
                                    </strong>

                                    <small>

                                        <code th:text="${curso.codigo != null ? curso.codigo : 'Sin código'}">
                                            Código
                                        </code>

                                        <span> | </span>

                                        <span th:text="${curso.catedratico != null ? curso.catedratico.nombreCompleto : 'Sin catedrático'}">
                                            Catedrático
                                        </span>

                                    </small>

                                </div>

                            </div>

                            <!-- BOTONES -->
                            <div class="course-actions">

                                <a th:href="@{/cursos/{id}(id=${curso.id})}"
                                   class="btn btn-outline btn-xs"
                                   title="Ver estudiantes">

                                    <i class="fas fa-users"></i>
                                    Estudiantes
                                </a>

                                <a th:href="@{/asistencia/curso/{id}(id=${curso.id})}"
                                   class="btn btn-success btn-xs"
                                   title="Asistencia">

                                    <i class="fas fa-clipboard-check"></i>
                                    Asistencia
                                </a>

                                <a th:href="@{/cursos/{id}/editar(id=${curso.id})}"
                                   class="btn btn-warning btn-xs"
                                   title="Editar curso"
                                   sec:authorize="hasRole('ADMIN')">

                                    <i class="fas fa-edit"></i>
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <style>

        .tree-container{
            display:flex;
            flex-direction:column;
            gap:24px;
            padding:10px;
        }

        .tree-root{
            border-left:3px solid var(--umg-azul);
            padding-left:18px;
        }

        .career-node{
            background:#0b3c75;
            color:white;
            padding:12px 16px;
            border-radius:10px;
            font-weight:700;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
            cursor:pointer;
            user-select:none;
            box-shadow:0 4px 10px rgba(0,0,0,0.12);
            width:fit-content;
            min-width:240px;
        }

        .arrow-icon{
            transition:transform 0.3s ease;
        }

        .tree-root.collapsed .course-children{
            display:none;
        }

        .tree-root.collapsed .arrow-icon{
            transform:rotate(-90deg);
        }

        .course-children{
            margin-left:30px;
            margin-top:12px;
            display:flex;
            flex-direction:column;
            gap:12px;
            border-left:2px dashed #cbd5e1;
            padding-left:18px;
        }

        .course-node{
            background:#f8fafc;
            border:1px solid #dbe3ec;
            padding:12px 14px;
            border-radius:10px;

            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:14px;

            width:880px;
            max-width:100%;
            box-sizing:border-box;
        }

        .course-info{
            display:flex;
            align-items:flex-start;
            gap:12px;
            flex:1;
            min-width:0;
        }

        .course-info i{
            color:var(--umg-azul);
            font-size:18px;
            margin-top:4px;
        }

        .course-info div{
            display:flex;
            flex-direction:column;
            gap:4px;
            min-width:0;
        }

        .course-info strong{
            font-size:16px;
            color:#0f172a;
            word-break:break-word;
        }

        .course-info small{
            color:#64748b;
            font-size:12px;
            font-weight:500;
            word-break:break-word;
        }

        .course-actions{
            display:flex;
            align-items:center;
            gap:6px;
            flex-wrap:wrap;
            flex-shrink:0;
        }

        .btn-xs{
            padding:5px 9px;
            font-size:12px;
            border-radius:7px;
        }

        .btn-success{
            background:#198754;
            color:white;
            border:1px solid #198754;
        }

        .btn-warning{
            background:#d99a15;
            color:white;
            border:1px solid #d99a15;
        }

        /* RESPONSIVE */
        @media (max-width: 768px){

            .tree-container{
                padding:4px;
            }

            .tree-root{
                padding-left:10px;
            }

            .course-children{
                margin-left:12px;
                padding-left:12px;
            }

            .career-node{
                width:100%;
                min-width:unset;
                font-size:14px;
            }

            .course-node{
                width:100%;
                flex-direction:column;
                align-items:flex-start;
            }

            .course-info{
                width:100%;
            }

            .course-actions{
                width:100%;
                justify-content:flex-start;
            }

            .course-actions .btn,
            .course-actions .btn-xs{
                font-size:11px;
                padding:5px 8px;
            }

        }

    </style>

    <script>
        function toggleCursos(elemento){
            const raiz = elemento.closest('.tree-root');
            raiz.classList.toggle('collapsed');
        }
    </script>

</th:block>

</body>
</html>
