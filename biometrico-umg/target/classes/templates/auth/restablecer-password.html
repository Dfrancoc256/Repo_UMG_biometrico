<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/auth :: authLayout(~{::content}, 'restablecer')}">
<body>
<th:block th:fragment="content">

    <h2>Nueva contraseña</h2>

    <p style="color:#666;margin-bottom:18px;">
        Ingresa tu nueva contraseña para recuperar el acceso.
    </p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/auth/restablecer-password}" method="post">

        <input type="hidden" name="token" th:value="${token}">

        <div class="form-group">
            <label>Nueva contraseña</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Nueva contraseña"
                   minlength="6"
                   required>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:14px;">
            Cambiar contraseña
        </button>

    </form>

</th:block>
</body>
</html>
