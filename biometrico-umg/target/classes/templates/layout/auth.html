<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="authLayout(content, activePage)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biométrico UMG</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .login-art {
      justify-content: flex-start;
      padding-top: 46px;
      position: relative;
    }
    .login-art-inner { width: 100%; max-width: 360px; }
    .login-art-actions {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .login-art-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all .2s ease;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .login-art-btn:hover {
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.30);
      transform: translateX(2px);
    }
    .login-art-btn i { font-size: 14px; color: var(--umg-dorado, #cc9933); }
    .login-art-btn.active-side {
      background: rgba(255,255,255,.18);
      border-color: rgba(255,255,255,.35);
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    .login-art-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,.14);
      margin: 22px 0 16px;
    }
    .login-art-subtitle {
      font-size: 12px;
      opacity: .72;
      margin-bottom: 10px;
      letter-spacing: .3px;
    }
    .login-menu-toggle {
      display: none;
    }
    @media (max-width: 900px) {
      .login-page {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: stretch;
        background: #f4f7fb;
        position: relative;
      }
      .login-menu-toggle {
        display: flex;
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 6000;
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 10px;
        background: var(--umg-azul, #003366);
        color: #ffffff;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(0,0,0,.18);
      }
      .login-art {
        display: flex !important;
        position: fixed;
        top: 0;
        left: 0;
        width: 82%;
        max-width: 370px;
        height: 100vh;
        z-index: 5500;
        transform: translateX(-100%);
        transition: transform .28s ease;
        padding: 82px 28px 32px 28px;
        overflow-y: auto;
        justify-content: flex-start;
        background: linear-gradient(135deg, #003366 0%, #064780 55%, #001f3f 100%) !important;
        box-shadow: 8px 0 24px rgba(0,0,0,.28);
      }
      .login-art.open { transform: translateX(0); }
      .login-form-panel {
        width: 100%;
        min-height: 100vh;
        padding: 82px 24px 36px 24px;
      }
      .login-form-inner { max-width: 430px; margin: 0 auto; }
    }
    @media (max-width: 480px) {
      .login-menu-toggle { top: 12px; left: 12px; width: 40px; height: 40px; }
      .login-art { width: 86%; padding: 76px 22px 28px 22px; }
      .login-art img { max-width: 90px !important; }
      .login-art h1 { font-size: 22px; }
      .login-art p { font-size: 13px; }
      .login-form-panel { padding: 76px 18px 30px 18px; }
    }
  </style>
</head>
<body>
<div class="login-page">

  <button type="button" class="login-menu-toggle" id="loginMenuToggle">
    <i class="fas fa-bars"></i>
  </button>

  <!-- PANEL IZQUIERDO (compartido) -->
  <div class="login-art" id="loginArt">
    <div class="login-art-inner">
      <div style="display:flex;justify-content:center;margin-bottom:16px;">
        <img th:src="@{/img/logo-umg.png}" alt="Universidad Mariano Gálvez" style="max-width:120px;"/>
      </div>
      <h1>Universidad Mariano Gálvez<br/>de Guatemala</h1>
      <p>Sistema de Registro Biométrico de Ingreso<br/>Sede La Florida · Zona 19 · 2026</p>

      <div style="margin-top:32px;display:flex;gap:24px;opacity:.6;font-size:28px;justify-content:center;">
        <i class="fas fa-camera"></i>
        <i class="fas fa-fingerprint"></i>
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-id-card"></i>
      </div>

      <div class="login-art-divider"></div>
      <div class="login-art-subtitle">OPCIONES DE ACCESO</div>

      <div class="login-art-actions">
        <button type="button" class="login-art-btn"
                th:classappend="${activePage == 'login'} ? ' active-side'"
                data-auth-nav="/auth/login">
          <i class="fas fa-keyboard"></i>
          <span>Inicio de sesión</span>
        </button>

        <button type="button" class="login-art-btn"
                th:classappend="${activePage == 'validar'} ? ' active-side'"
                data-auth-nav="/auth/validar-carnet">
          <i class="fas fa-shield-alt"></i>
          <span>Validar Carné PDF</span>
        </button>

        <a th:href="@{/enrolamiento}" class="login-art-btn">
          <i class="fas fa-graduation-cap"></i>
          <span>Asignarse a cursos</span>
        </a>
      </div>
    </div>
  </div>

  <!-- PANEL DERECHO (contenido dinámico) -->
  <div class="login-form-panel">
    <div id="auth-content" class="login-form-inner">
      <th:block th:replace="${content}"/>
    </div>
  </div>

</div>

<script th:src="@{/js/main.js}"></script>
<script>
  /* ── Navegación AJAX entre páginas auth ─────────────────────── */
  document.querySelectorAll('[data-auth-nav]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      loadAuthContent(this.dataset.authNav);
    });
  });

  async function loadAuthContent(url) {
    document.querySelectorAll('.login-art-btn[data-auth-nav]').forEach(function(b) {
      b.classList.remove('active-side');
      if (b.dataset.authNav === url) b.classList.add('active-side');
    });

    try {
      var resp = await fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
      if (!resp.ok) throw new Error(resp.status);
      var html = await resp.text();
      document.getElementById('auth-content').innerHTML = html;
      history.pushState({ authUrl: url }, '', url);
      bindAjaxForms();
    } catch (e) {
      window.location.href = url;
    }
  }

  /* Intercepta clics en links dentro del panel derecho que apunten a rutas auth */
  document.getElementById('auth-content').addEventListener('click', function(e) {
    var link = e.target.closest('a[href]');
    if (!link) return;
    try {
      var target = new URL(link.href, location.origin);
      var authPaths = ['/auth/login', '/auth/validar-carnet'];
      if (authPaths.indexOf(target.pathname) !== -1) {
        e.preventDefault();
        loadAuthContent(target.pathname);
      }
    } catch (ignore) {}
  });

  /* Envío AJAX de formularios marcados con data-ajax */
  function bindAjaxForms() {
    document.querySelectorAll('#auth-content form[data-ajax]').forEach(function(form) {
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        try {
          var resp = await fetch(form.action, {
            method: form.method.toUpperCase(),
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            body: new FormData(form)
          });
          if (!resp.ok) throw new Error(resp.status);
          var html = await resp.text();
          document.getElementById('auth-content').innerHTML = html;
          bindAjaxForms();
        } catch (e) {
          form.removeEventListener('submit', arguments.callee);
          form.submit();
        }
      });
    });
  }

  /* Botones Atrás / Adelante del navegador */
  window.addEventListener('popstate', function(e) {
    if (e.state && e.state.authUrl) loadAuthContent(e.state.authUrl);
  });

  /* Toggle sidebar móvil */
  document.getElementById('loginMenuToggle').addEventListener('click', function() {
    document.getElementById('loginArt').classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    var art = document.getElementById('loginArt');
    var toggle = document.getElementById('loginMenuToggle');
    if (art.classList.contains('open') && !art.contains(e.target) && !toggle.contains(e.target)) {
      art.classList.remove('open');
    }
  });
</script>
</body>
</html>
