<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Página no encontrada | Biométrico UMG</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="error-fullpage">

  <div class="error-container">

    <img th:src="@{/img/logo-umg.png}"
         alt="UMG"
         class="error-logo"/>

    <div class="error-code">
      404
    </div>

    <h2 class="error-title">
      Página no encontrada
    </h2>

    <p class="error-description">
      La página que buscas no existe o fue movida.
      <br/>
      Verifica la URL o regresa al sistema.
    </p>

    <div class="error-actions">

      <a th:href="@{/dashboard}" class="btn btn-primary">
        <i class="fas fa-tachometer-alt"></i>
        Ir al Dashboard
      </a>

      <a onclick="history.back()"
         class="btn btn-outline"
         style="cursor:pointer;">

        <i class="fas fa-arrow-left"></i>
        Volver atrás

      </a>

    </div>

    <p class="error-footer">
      Sistema Biométrico UMG v2.0 · La Florida, Zona 19
    </p>

  </div>

</div>
</body>
</html>
