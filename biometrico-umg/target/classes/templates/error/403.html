<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Acceso Denegado', '')}">
<body>
<th:block th:fragment="content">

  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
              padding:70px 20px;text-align:center;">
    <div style="width:90px;height:90px;border-radius:50%;background:#fdecea;
                display:flex;align-items:center;justify-content:center;margin-bottom:24px;">
      <i class="fas fa-lock" style="font-size:38px;color:var(--umg-rojo);"></i>
    </div>
    <h2 style="color:var(--umg-azul);margin-bottom:10px;">Acceso Denegado</h2>
    <p style="color:#7a8898;font-size:15px;max-width:420px;margin-bottom:28px;">
      No tienes los permisos necesarios para acceder a esta sección.
      Contacta al administrador si crees que esto es un error.
    </p>
    <div style="display:flex;gap:12px;">
      <a th:href="@{/dashboard}" class="btn btn-primary">
        <i class="fas fa-home"></i> Volver al Dashboard
      </a>
      <a th:href="@{/personas}" class="btn btn-outline">
        <i class="fas fa-users"></i> Ver Personas
      </a>
    </div>
  </div>

</th:block>
</body>
</html>
