<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Acceso Denegado', '')}">
<body>
<th:block th:fragment="content">

  <div class="error-page">

    <div class="error-icon error-danger">
      <i class="fas fa-lock"></i>
    </div>

    <h2>Acceso Denegado</h2>

    <p>
      No tienes los permisos necesarios para acceder a esta sección.
      Contacta al administrador si crees que esto es un error.
    </p>

    <div class="error-actions">
      <a th:href="@{/dashboard}" class="btn btn-primary">
        <i class="fas fa-home"></i> Volver al Dashboard
      </a>

      <a th:href="@{/personas}" class="btn btn-outline">
        <i class="fas fa-users"></i> Ver Personas
      </a>
    </div>

  </div>

</th:block>
</body>
</html>
